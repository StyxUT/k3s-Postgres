---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: tpu
                operator: NotIn
                values:
                - "true"
      containers:
      - name: postgres
        imagePullPolicy: "IfNotPresent"
        image: pgvector/pgvector:pg18
        ports:
          - containerPort: 5432
        env:
          - name: POSTGRES_PASSWORD
            valueFrom:
             secretKeyRef:
               name: postgres-password
               key: POSTGRES_PASSWORD
        volumeMounts:
          - name: synology-iscsi-postgres
            mountPath: /var/lib/postgresql
          - name: shm-volume
            mountPath: /dev/shm
      volumes:
       - name: synology-iscsi-postgres
         persistentVolumeClaim:
           claimName: synology-postgres
       - name: shm-volume
         emptyDir:
           medium: Memory
           sizeLimit: 128Mi
